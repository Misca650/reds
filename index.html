<!DOCTYPE html>
<html>
<head>
    <title>reCAPTCHA v3</title>
    <script src="https://www.google.com/recaptcha/api.js?render=6LcRV-AsAAAAAJxlVb7yHM9UhLWTGWOiiahLHJxC"></script>
</head>
<body>

<form id="form">
    <button type="submit">Submit</button>
</form>

<script>
grecaptcha.ready(function() {
    grecaptcha.execute('6Lc0WeAsAAAAAMZbENoaqwReeUzGAZopKPuQ64wY', {action: 'submit'}).then(function(token) {

        console.log("Token:", token);

        // Add token to form
        let input = document.createElement("input");
        input.type = "hidden";
        input.name = "g-recaptcha-response";
        input.value = token;

        document.getElementById("form").appendChild(input);
    });
});
</script>

</body>
</html>
